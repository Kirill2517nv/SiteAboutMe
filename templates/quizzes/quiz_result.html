{% extends 'base.html' %}

{% block title %}Результат: {{ quiz.title }}{% endblock title %}

{% block content %}
    <h1>Результаты теста</h1>
    <h2>{{ quiz.title }}</h2>
    
    <div style="padding: 20px; background-color: #f0f0f0; border-radius: 5px; margin: 20px 0;">
        <h3>Вы набрали: {{ score }} из {{ total }} баллов</h3>
    </div>

    <p>
        <a href="/quizzes/">Вернуться к списку тестов</a>
    </p>
{% endblock content %}
